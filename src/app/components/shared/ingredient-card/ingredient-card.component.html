<mat-card class="ingredient-card" (click)="openDetails()">
  <mat-card-header>
    <mat-card-title>{{ ingredient.name }}</mat-card-title>
    <mat-card-subtitle>
      <span class="type-badge">{{ componentTypeName }}</span>
      <span class="creature-badge">{{ creatureTypeName }}</span>
      @if (ingredient.isCustom) {
        <span class="custom-badge">Custom</span>
      }
    </mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    @if (effect) {
      <p class="effect-summary">{{ effect.description }}</p>
    } @else {
      <p class="no-effect">No magical effect for this combination.</p>
    }

    <div class="quantity-row">
      <span class="qty-label">In stock:</span>
      <button mat-icon-button [disabled]="quantity === 0" (click)="adjust(-1); $event.stopPropagation()">
        <mat-icon>remove</mat-icon>
      </button>
      <span class="qty-value" [class.has-qty]="quantity > 0">{{ quantity }}</span>
      <button mat-icon-button (click)="adjust(1); $event.stopPropagation()">
        <mat-icon>add</mat-icon>
      </button>
    </div>

  </mat-card-content>

</mat-card>
